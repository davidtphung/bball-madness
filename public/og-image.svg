<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </linearGradient>
    <linearGradient id="subtleGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0E1A"/>
  <rect width="1200" height="630" fill="url(#subtleGlow)"/>

  <!-- Border frame -->
  <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" stroke="#1E293B" stroke-width="1"/>

  <!-- Top accent line -->
  <rect x="20" y="20" width="1160" height="3" rx="1.5" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- Logo mark -->
  <rect x="60" y="60" width="64" height="64" rx="12" fill="#111827" stroke="#F59E0B" stroke-width="2" opacity="0.8"/>
  <text x="92" y="100" text-anchor="middle" font-family="Georgia,serif" font-weight="bold" font-size="30" fill="url(#goldGrad)">TP</text>

  <!-- Brand text -->
  <text x="140" y="85" font-family="Georgia,serif" font-weight="bold" font-size="28" fill="#FFFFFF">THE PROCESS</text>
  <text x="140" y="108" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#64748B" letter-spacing="3">NLT143 ANALYTICS</text>

  <!-- Main title -->
  <text x="60" y="220" font-family="Georgia,serif" font-weight="bold" font-size="62" fill="#FFFFFF">March Madness</text>
  <text x="60" y="290" font-family="Georgia,serif" font-weight="bold" font-size="62" fill="url(#goldGrad)">2026</text>

  <!-- Subtitle -->
  <text x="60" y="340" font-family="system-ui,sans-serif" font-size="20" fill="#64748B">Live bracket, probability models, and game tracking</text>

  <!-- Champion badge -->
  <rect x="60" y="380" width="280" height="52" rx="26" fill="#111827" stroke="#F59E0B" stroke-width="1.5" opacity="0.9"/>
  <text x="86" y="412" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#F59E0B" letter-spacing="2">CHAMPION PICK</text>
  <text x="240" y="413" font-family="monospace" font-weight="bold" font-size="20" fill="#FBBF24">Arizona</text>
  <text x="86" y="370" font-size="22">🏆</text>

  <!-- Stats boxes -->
  <!-- Title Prob -->
  <rect x="700" y="160" width="200" height="100" rx="12" fill="url(#cardGrad)" stroke="#1E293B" stroke-width="1"/>
  <text x="720" y="195" font-family="system-ui,sans-serif" font-weight="600" font-size="10" fill="#64748B" letter-spacing="2">TITLE PROB</text>
  <text x="720" y="240" font-family="monospace" font-weight="bold" font-size="42" fill="#F59E0B">22%</text>

  <!-- Teams -->
  <rect x="920" y="160" width="220" height="100" rx="12" fill="url(#cardGrad)" stroke="#1E293B" stroke-width="1"/>
  <text x="940" y="195" font-family="system-ui,sans-serif" font-weight="600" font-size="10" fill="#64748B" letter-spacing="2">TEAMS MODELED</text>
  <text x="940" y="240" font-family="monospace" font-weight="bold" font-size="42" fill="#3B82F6">11</text>

  <!-- Upsets -->
  <rect x="700" y="280" width="200" height="100" rx="12" fill="url(#cardGrad)" stroke="#1E293B" stroke-width="1"/>
  <text x="720" y="315" font-family="system-ui,sans-serif" font-weight="600" font-size="10" fill="#64748B" letter-spacing="2">UPSETS CALLED</text>
  <text x="720" y="360" font-family="monospace" font-weight="bold" font-size="42" fill="#EF4444">7</text>

  <!-- Games -->
  <rect x="920" y="280" width="220" height="100" rx="12" fill="url(#cardGrad)" stroke="#1E293B" stroke-width="1"/>
  <text x="940" y="315" font-family="system-ui,sans-serif" font-weight="600" font-size="10" fill="#64748B" letter-spacing="2">BRACKET GAMES</text>
  <text x="940" y="360" font-family="monospace" font-weight="bold" font-size="42" fill="#22C55E">63</text>

  <!-- Region pills at bottom -->
  <rect x="700" y="420" width="90" height="28" rx="14" fill="#3B82F610" stroke="#3B82F6" stroke-width="1"/>
  <text x="745" y="439" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#3B82F6">East</text>

  <rect x="800" y="420" width="90" height="28" rx="14" fill="#EF444410" stroke="#EF4444" stroke-width="1"/>
  <text x="845" y="439" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#EF4444">West</text>

  <rect x="900" y="420" width="90" height="28" rx="14" fill="#22C55E10" stroke="#22C55E" stroke-width="1"/>
  <text x="945" y="439" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#22C55E">South</text>

  <rect x="1000" y="420" width="110" height="28" rx="14" fill="#F59E0B10" stroke="#F59E0B" stroke-width="1"/>
  <text x="1055" y="439" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#F59E0B">Midwest</text>

  <!-- URL -->
  <text x="60" y="570" font-family="monospace" font-size="14" fill="#475569">bballmadness.davidtphung.com</text>

  <!-- Bottom accent -->
  <rect x="60" y="590" width="200" height="2" rx="1" fill="url(#goldGrad)" opacity="0.4"/>
</svg>
